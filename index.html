    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #map {
            height: 40vh;

        }
        #sidebar {
            height: 60vh;
            width: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        @media (min-width: 769px) {
            body {
                flex-direction: row;

            #map {
                height: 100vh;
                width: 65%;

            #sidebar {
